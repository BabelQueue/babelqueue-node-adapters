name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

      # Publish bullmq first (nestjs depends on it).
      - name: Publish @babelqueue/bullmq
        run: npm publish -w @babelqueue/bullmq --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @babelqueue/nestjs
        run: npm publish -w @babelqueue/nestjs --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # @babelqueue/sqs has no workspace dependents, so publish order is free.
      - name: Publish @babelqueue/sqs
        run: npm publish -w @babelqueue/sqs --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
